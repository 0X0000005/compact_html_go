name: Build and Release

on:
  push:
    tags:
      - 'v*' # Trigger on tags matching v*, e.g., v1.0.0

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write # Need this permission to upload release assets

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Setup UPX
        uses: crazy-max/ghaction-upx@v3
        with:
          install-only: true

      - name: Run Build Script
        run: .\build.bat
        shell: cmd

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            compact_html.exe
            compact_html
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
